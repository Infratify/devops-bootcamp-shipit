name: deploy
on: [push, workflow_dispatch]

jobs:
  say-hello:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: launchpad
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: launchpad/dist
      - uses: actions/deploy-pages@v5

permissions:
  contents: read
  pages: write
  id-token: write
